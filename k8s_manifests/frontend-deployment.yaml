apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-rl-frontend
  labels:
    app: cloud-rl-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloud-rl-frontend
  template:
    metadata:
      labels:
        app: cloud-rl-frontend
    spec:
      containers:
      - name: frontend
        image: your-docker-registry/cloud-rl-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: cloud-rl-frontend-svc
spec:
  type: LoadBalancer # Expose to outside world
  selector:
    app: cloud-rl-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
